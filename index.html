<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 大港時程表</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="大港時程表">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        select, input { font-size: 16px !important; } 
        .matrix-grid { display: grid; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 常數設定 ---
        const TIME_STEP = 10; 
        const PRESET_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899', '#64748B', '#000000'];

        const timeToMinutes = (time) => {
            if(!time) return 0;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (totalMinutes) => {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        // --- 主程式 ---
        function App() {
            const [stages, setStages] = useState([]);
            const [acts, setActs] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [activeTab, setActiveTab] = useState('explore');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState('');
            const [activeStageId, setActiveStageId] = useState('');

            // 資料讀取
            useEffect(() => {
                const s = localStorage.getItem('megaport_v5_stages');
                const a = localStorage.getItem('megaport_v5_acts');
                const p = localStorage.getItem('megaport_v5_picks');
                if (s) setStages(JSON.parse(s));
                if (a) setActs(JSON.parse(a));
                if (p) setSelectedIds(JSON.parse(p));
            }, []);

            // 資料儲存
            useEffect(() => {
                localStorage.setItem('megaport_v5_stages', JSON.stringify(stages));
                localStorage.setItem('megaport_v5_acts', JSON.stringify(acts));
                localStorage.setItem('megaport_v5_picks', JSON.stringify(selectedIds));
            }, [stages, acts, selectedIds]);

            const availableDays = useMemo(() => Array.from(new Set(acts.map(a => a.day))).sort(), [acts]);
            
            useEffect(() => {
                if (!currentDay && availableDays.length > 0) setCurrentDay(availableDays[0]);
                if (!activeStageId && stages.length > 0) setActiveStageId(stages[0].id);
            }, [availableDays, stages]);

            const dayRange = useMemo(() => {
                const dayActs = acts.filter(a => a.day === currentDay);
                if (dayActs.length === 0) return { start: 660, end: 1320 };
                const starts = dayActs.map(a => timeToMinutes(a.startTime));
                const ends = dayActs.map(a => timeToMinutes(a.endTime));
                return {
                    start: Math.floor(Math.min(...starts) / 60) * 60,
                    end: Math.ceil(Math.max(...ends) / 60) * 60
                };
            }, [acts, currentDay]);

            const togglePick = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            return (
                <div className="min-h-screen pb-24 font-sans">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex flex-col">
                            <span className="font-black text-xl">2026 大港時程表</span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Personal Manager</span>
                        </div>
                        <button onClick={() => setIsAdminOpen(true)} className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-xl">⚙️</button>
                    </header>

                    {/* Navbar */}
                    <nav className="flex bg-white border-b sticky top-[68px] z-40">
                        <button onClick={() => setActiveTab('explore')} className={`flex-1 py-4 text-center text-xs font-bold uppercase ${activeTab === 'explore' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📂 舞台</button>
                        <button onClick={() => setActiveTab('matrix')} className={`flex-1 py-4 text-center text-xs font-bold uppercase ${activeTab === 'matrix' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📅 總表</button>
                        <button onClick={() => setActiveTab('picks')} className={`flex-1 py-4 text-center text-xs font-bold uppercase ${activeTab === 'picks' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📝 時程表</button>
                    </nav>

                    {/* Day Selection */}
                    {availableDays.length > 0 && (
                        <div className="px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar bg-slate-50 border-b">
                            {availableDays.map(day => (
                                <button key={day} onClick={() => setCurrentDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-black transition-all border-2 ${currentDay === day ? 'bg-black border-black text-white' : 'bg-white border-slate-200 text-slate-400'}`}>{day}</button>
                            ))}
                        </div>
                    )}

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'explore' && (
                            <div className="space-y-4">
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {stages.map(s => (
                                        <button key={s.id} onClick={() => setActiveStageId(s.id)} className={`px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap border-2 transition-all flex items-center gap-2 ${activeStageId === s.id ? 'bg-white border-slate-900 shadow-sm' : 'bg-white border-slate-100 text-slate-400'}`}>
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {acts.filter(a => a.day === currentDay && a.stageId === activeStageId).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map(act => (
                                        <div key={act.id} onClick={() => togglePick(act.id)} className={`p-5 rounded-[24px] border-2 flex items-center justify-between active:scale-95 transition-all ${selectedIds.includes(act.id) ? 'border-slate-900 bg-white shadow-lg' : 'border-transparent bg-white shadow-sm'}`}>
                                            <div className="space-y-1">
                                                <div className="text-[10px] font-black font-mono px-2 py-0.5 rounded-md inline-block" style={{ backgroundColor: `${stages.find(s=>s.id===act.stageId)?.color}20`, color: stages.find(s=>s.id===act.stageId)?.color }}>{act.startTime} — {act.endTime}</div>
                                                <h3 className="font-bold text-lg leading-tight">{act.name}</h3>
                                            </div>
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center ${selectedIds.includes(act.id) ? 'bg-black border-black text-white text-xs' : 'border-slate-100 text-transparent'}`}>✅</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'matrix' && (
                            <div className="overflow-x-auto border-2 border-slate-900 rounded-[32px] bg-white shadow-xl relative overflow-hidden">
                                <div className="matrix-grid" style={{ gridTemplateColumns: `60px repeat(${stages.length}, 100px)`, gridTemplateRows: `50px repeat(${(dayRange.end - dayRange.start) / TIME_STEP}, 25px)` }}>
                                    <div className="sticky top-0 left-0 bg-slate-900 z-30 flex items-center justify-center text-[8px] text-white font-black italic">TIME</div>
                                    {stages.map(s => (
                                        <div key={s.id} className="sticky top-0 bg-slate-900 text-white text-[10px] font-black flex flex-col items-center justify-center z-20 border-l border-slate-800">
                                            <div className="w-1.5 h-1.5 rounded-full mb-1" style={{ backgroundColor: s.color }} />{s.name}
                                        </div>
                                    ))}
                                    {Array.from({ length: (dayRange.end - dayRange.start) / TIME_STEP }).map((_, i) => (
                                        <div key={i} className="sticky left-0 bg-slate-50 border-r border-b border-slate-100 text-[8px] font-black flex items-center justify-center text-slate-400 z-10 font-mono">{minutesToTime(dayRange.start + (i * TIME_STEP))}</div>
                                    ))}
                                    {acts.filter(a => a.day === currentDay).map(act => {
                                        const stage = stages.find(s => s.id === act.stageId);
                                        const isPicked = selectedIds.includes(act.id);
                                        const colIdx = stages.findIndex(s=>s.id===act.stageId);
                                        if (colIdx === -1) return null;
                                        return (
                                            <div key={act.id} onClick={() => togglePick(act.id)} className={`m-[1px] p-1 text-[8px] leading-[1.1] font-black rounded-md flex items-center justify-center text-center border-2 ${isPicked ? 'z-40 shadow-md' : 'opacity-20 grayscale'}`} style={{ gridRowStart: (timeToMinutes(act.startTime)-dayRange.start)/TIME_STEP+2, gridRowEnd: (timeToMinutes(act.endTime)-dayRange.start)/TIME_STEP+2, gridColumnStart: colIdx+2, backgroundColor: isPicked ? `${stage?.color}20` : '#f1f5f9', borderColor: isPicked ? stage?.color : '#e2e8f0', color: isPicked ? stage?.color : '#94a3b8' }}>
                                                {act.name}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && (
                            <div className="space-y-4">
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map((act, idx, arr) => {
                                    const stage = stages.find(s => s.id === act.stageId);
                                    const conflict = arr[idx-1] && timeToMinutes(act.startTime) < timeToMinutes(arr[idx-1].endTime);
                                    return (
                                        <div key={act.id} className={`p-6 rounded-[32px] bg-white shadow-sm border-2 ${conflict ? 'border-red-500 bg-red-50' : 'border-white shadow-md'}`}>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black font-mono bg-black text-white px-3 py-1 rounded-full">{act.startTime} - {act.endTime}</span>
                                                    {conflict && <span className="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full font-black">⚠️ 衝突</span>}
                                                </div>
                                                <h3 className="text-xl font-black">{act.name}</h3>
                                                <div className="text-[10px] font-black uppercase tracking-widest flex items-center gap-1" style={{ color: stage?.color }}>📍 {stage?.name}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Admin Drawer */}
                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-8 max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black italic">CONFIG</h2>
                                    <button onClick={() => setIsAdminOpen(false)} className="w-10 h-10 bg-slate-100 rounded-full text-xl flex items-center justify-center">❌</button>
                                </div>

                                <section className="mb-8">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">1. 舞台設定</h3>
                                    <div className="bg-slate-50 p-6 rounded-[24px] space-y-4">
                                        <input id="s-name" type="text" placeholder="輸入舞台名稱..." className="w-full bg-white border-none rounded-xl px-4 py-3 text-sm font-bold shadow-sm" />
                                        <div className="flex flex-wrap gap-2">
                                            {PRESET_COLORS.map(c => (
                                                <button key={c} onClick={() => window._selColor = c} className="w-8 h-8 rounded-full border-2 border-white shadow-sm focus:ring-4 focus:ring-black" style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        <button onClick={() => { const n = document.getElementById('s-name').value; if(n) setStages([...stages, { id: Date.now().toString(), name: n, color: window._selColor || '#000' }]); document.getElementById('s-name').value=''; }} className="w-full bg-black text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-slate-300">建立舞台</button>
                                    </div>
                                    <div className="mt-4 flex flex-wrap gap-2">
                                        {stages.map(s => (
                                            <div key={s.id} className="bg-white border-2 px-3 py-1.5 rounded-full text-[10px] font-black flex items-center gap-2 shadow-sm" style={{ borderColor: s.color }}>
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                                <button onClick={() => setStages(stages.filter(x=>x.id!==s.id))} className="text-slate-300">🗑️</button>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">2. 演出資料</h3>
                                    <form className="space-y-4" onSubmit={(e) => {
                                        e.preventDefault();
                                        const f = e.target;
                                        setActs([...acts, { id: Date.now().toString(), day: f.day.value, stageId: f.stageId.value, name: f.actName.value, startTime: `${f.sh.value}:${f.sm.value}`, endTime: `${f.eh.value}:${f.em.value}` }]);
                                        f.actName.value = '';
                                    }}>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input name="day" type="date" required className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                            <select name="stageId" className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none">
                                                {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        <input name="actName" placeholder="演出名稱 (如: 滅火器)" required className="w-full bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl text-center">
                                            <div><p className="text-[9px] font-black text-slate-400 mb-2 uppercase">Start</p><div className="flex gap-1"><TimeSelect name="sh" type="h" /><TimeSelect name="sm" type="m" /></div></div>
                                            <div><p className="text-[9px] font-black text-slate-400 mb-2 uppercase">End</p><div className="flex gap-1"><TimeSelect name="eh" type="h" /><TimeSelect name="em" type="m" /></div></div>
                                        </div>
                                        <button type="submit" className="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-100 text-xs flex items-center justify-center gap-2">💾 存入時程</button>
                                    </form>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TimeSelect({ name, type }) {
            const opts = type === 'h' ? Array.from({length: 24}, (_, i) => i.toString().padStart(2, '0')) : ['00', '10', '20', '30', '40', '50'];
            return <select name={name} className="flex-1 bg-white rounded-lg p-2 text-xs font-black border-none shadow-sm">{opts.map(o => <option key={o} value={o}>{o}</option>)}</select>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
