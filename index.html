<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 大港時程表</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="大港時程表">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        select, input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TIME_STEP = 10; 
        const PRESET_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899', '#64748B', '#000000'];

        const timeToMinutes = (time) => {
            if(!time) return 0;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (totalMinutes) => {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        function App() {
            const [stages, setStages] = useState([]);
            const [acts, setActs] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            
            const [activeTab, setActiveTab] = useState('explore');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState('');
            const [activeStageId, setActiveStageId] = useState('');
            
            const [editingActId, setEditingActId] = useState(null);
            const [formAct, setFormAct] = useState({ day: '', stageId: '', name: '', sh: '12', sm: '00', eh: '13', em: '00' });
            const [backupData, setBackupData] = useState('');

            // Data Persistence Key (Updated to v7 for Backup Feature)
            const STORAGE_KEY = 'megaport_v7_data';

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStages(parsed.stages || []);
                    setActs(parsed.acts || []);
                    setSelectedIds(parsed.selectedIds || []);
                }
            }, []);

            useEffect(() => {
                const dataToSave = { stages, acts, selectedIds };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
            }, [stages, acts, selectedIds]);

            const availableDays = useMemo(() => Array.from(new Set(acts.map(a => a.day))).sort(), [acts]);
            
            useEffect(() => {
                if (!currentDay && availableDays.length > 0) setCurrentDay(availableDays[0]);
                if (!activeStageId && stages.length > 0) setActiveStageId(stages[0].id);
            }, [availableDays, stages]);

            const dayRange = useMemo(() => {
                const dayActs = acts.filter(a => a.day === currentDay);
                if (dayActs.length === 0) return { start: 660, end: 1320 };
                const starts = dayActs.map(a => timeToMinutes(a.startTime));
                const ends = dayActs.map(a => timeToMinutes(a.endTime));
                return {
                    start: Math.floor(Math.min(...starts) / 60) * 60,
                    end: Math.ceil(Math.max(...ends) / 60) * 60
                };
            }, [acts, currentDay]);

            // Handlers
            const handleActSubmit = (e) => {
                e.preventDefault();
                const newAct = {
                    id: editingActId || Date.now().toString(),
                    day: formAct.day,
                    stageId: formAct.stageId,
                    name: formAct.name,
                    startTime: `${formAct.sh}:${formAct.sm}`,
                    endTime: `${formAct.eh}:${formAct.em}`
                };

                if (editingActId) {
                    setActs(acts.map(a => a.id === editingActId ? newAct : a));
                    setEditingActId(null);
                } else {
                    setActs([...acts, newAct]);
                }
                setFormAct({ ...formAct, name: '' });
            };

            const deleteAct = (id) => { if(confirm('確定要刪除這場演出嗎？')) setActs(acts.filter(a => a.id !== id)); };
            const deleteStage = (id) => { if(confirm('警告：刪除舞台將連同演出一併刪除。')) { setStages(stages.filter(s => s.id !== id)); setActs(acts.filter(a => a.stageId !== id)); } };
            const togglePick = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            // --- Backup & Restore Logic ---
            const handleExport = () => {
                const dataString = JSON.stringify({ stages, acts, selectedIds });
                setBackupData(dataString);
                alert('備份代碼已產生在下方文字框，請複製並妥善保存！');
            };

            const handleImport = () => {
                if(!backupData) return alert('請先貼上備份代碼！');
                if(confirm('警告：這將會清除目前所有資料並以備份代碼取代，確定嗎？')) {
                    try {
                        const parsed = JSON.parse(backupData);
                        setStages(parsed.stages || []);
                        setActs(parsed.acts || []);
                        setSelectedIds(parsed.selectedIds || []);
                        alert('資料還原成功！');
                        setBackupData('');
                    } catch (e) {
                        alert('還原失敗：備份代碼格式錯誤！');
                    }
                }
            };

            return (
                <div className="min-h-screen pb-24 font-sans antialiased">
                    <header className="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex flex-col">
                            <span className="font-black text-xl">2026 大港時程表</span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Master Edition v7</span>
                        </div>
                        <button onClick={() => setIsAdminOpen(true)} className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center">⚙️</button>
                    </header>

                    <nav className="flex bg-white border-b sticky top-[68px] z-40">
                        <button onClick={() => setActiveTab('explore')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'explore' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📂 舞台</button>
                        <button onClick={() => setActiveTab('matrix')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'matrix' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📅 總表</button>
                        <button onClick={() => setActiveTab('picks')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'picks' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📝 時程表</button>
                    </nav>

                    {availableDays.length > 0 && activeTab !== 'matrix' && (
                        <div className="px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar bg-slate-50 border-b">
                            {availableDays.map(day => (
                                <button key={day} onClick={() => setCurrentDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-black border-2 ${currentDay === day ? 'bg-black text-white shadow-md' : 'bg-white text-slate-400'}`}>{day}</button>
                            ))}
                        </div>
                    )}

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'explore' && (
                            <div className="space-y-4">
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {stages.map(s => (
                                        <button key={s.id} onClick={() => setActiveStageId(s.id)} className={`px-4 py-2 rounded-xl text-xs font-black border-2 flex items-center gap-2 ${activeStageId === s.id ? 'border-black bg-white shadow-sm' : 'border-slate-100 text-slate-400'}`}>
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {acts.filter(a => a.day === currentDay && a.stageId === activeStageId).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map(act => (
                                        <div key={act.id} onClick={() => togglePick(act.id)} className={`p-5 rounded-[24px] border-2 flex items-center justify-between bg-white transition-all active:scale-95 ${selectedIds.includes(act.id) ? 'border-slate-900 shadow-xl' : 'border-transparent shadow-sm'}`}>
                                            <div>
                                                <div className="text-[10px] font-black px-2 py-0.5 rounded-md inline-block mb-1" style={{ backgroundColor: `${stages.find(s=>s.id===act.stageId)?.color}20`, color: stages.find(s=>s.id===act.stageId)?.color }}>{act.startTime} - {act.endTime}</div>
                                                <h3 className="font-bold text-lg">{act.name}</h3>
                                            </div>
                                            <div className={`w-8 h-8 rounded-full border flex items-center justify-center ${selectedIds.includes(act.id) ? 'bg-black text-white text-xs' : 'text-transparent'}`}>✅</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'matrix' && (
                            <div className="overflow-x-auto border-2 border-slate-900 rounded-[32px] bg-white relative overflow-hidden shadow-2xl">
                                <div className="grid" style={{ gridTemplateColumns: `60px repeat(${stages.length}, 100px)`, gridTemplateRows: `50px repeat(${(dayRange.end - dayRange.start) / TIME_STEP}, 25px)` }}>
                                    <div className="sticky top-0 left-0 bg-slate-900 z-30 flex items-center justify-center text-[8px] text-white font-black italic">TIME</div>
                                    {stages.map(s => (
                                        <div key={s.id} className="sticky top-0 bg-slate-900 text-white text-[10px] font-black flex flex-col items-center justify-center z-20 border-l border-slate-800">
                                            <div className="w-1.5 h-1.5 rounded-full mb-1" style={{ backgroundColor: s.color }} />{s.name}
                                        </div>
                                    ))}
                                    {Array.from({ length: (dayRange.end - dayRange.start) / TIME_STEP }).map((_, i) => (
                                        <div key={i} className="sticky left-0 bg-slate-50 border-r border-b text-[8px] font-black flex items-center justify-center text-slate-400 z-10 font-mono">{minutesToTime(dayRange.start + (i * TIME_STEP))}</div>
                                    ))}
                                    {acts.filter(a => a.day === currentDay).map(act => {
                                        const stage = stages.find(s => s.id === act.stageId);
                                        const isPicked = selectedIds.includes(act.id);
                                        const colIdx = stages.findIndex(s=>s.id===act.stageId);
                                        if (colIdx === -1) return null;
                                        return (
                                            <div key={act.id} onClick={() => togglePick(act.id)} className={`m-[1px] p-1 text-[8px] leading-tight font-black rounded-md flex items-center justify-center text-center border-2 transition-all ${isPicked ? 'z-10 opacity-100 shadow-md' : 'opacity-10 grayscale pointer-events-none'}`} style={{ gridRowStart: (timeToMinutes(act.startTime)-dayRange.start)/TIME_STEP+2, gridRowEnd: (timeToMinutes(act.endTime)-dayRange.start)/TIME_STEP+2, gridColumnStart: colIdx+2, backgroundColor: `${stage?.color}20`, borderColor: stage?.color, color: stage?.color }}>
                                                {act.name}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && (
                            <div className="space-y-4">
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map((act, idx, arr) => {
                                    const stage = stages.find(s => s.id === act.stageId);
                                    const conflict = arr[idx-1] && timeToMinutes(act.startTime) < timeToMinutes(arr[idx-1].endTime);
                                    return (
                                        <div key={act.id} className={`p-6 rounded-[32px] bg-white border-2 ${conflict ? 'border-red-500 bg-red-50' : 'border-white shadow-md'}`}>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black font-mono bg-black text-white px-3 py-1 rounded-full">{act.startTime} - {act.endTime}</span>
                                                    {conflict && <span className="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full font-black">⚠️ 衝突</span>}
                                                </div>
                                                <h3 className="text-xl font-black">{act.name}</h3>
                                                <div className="text-[10px] font-black uppercase tracking-widest flex items-center gap-1" style={{ color: stage?.color }}>📍 {stage?.name}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-8 max-h-[95vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black italic">{editingActId ? '✏️ 編輯中' : '⚙️ 設定'}</h2>
                                    <button onClick={() => { setIsAdminOpen(false); setEditingActId(null); }} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center">❌</button>
                                </div>

                                {/* Input Form */}
                                <section className="mb-8 border-b pb-8">
                                    <form className="space-y-4" onSubmit={handleActSubmit}>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="date" value={formAct.day} onChange={e=>setFormAct({...formAct, day: e.target.value})} required className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                            <select value={formAct.stageId} onChange={e=>setFormAct({...formAct, stageId: e.target.value})} required className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none">
                                                <option value="">選擇舞台</option>
                                                {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        <input placeholder="演出名稱 (如: 滅火器)" value={formAct.name} onChange={e=>setFormAct({...formAct, name: e.target.value})} required className="w-full bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl text-center">
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 mb-2">START</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.sh} onChange={e=>setFormAct({...formAct, sh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.sm} onChange={e=>setFormAct({...formAct, sm: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 mb-2">END</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.eh} onChange={e=>setFormAct({...formAct, eh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.em} onChange={e=>setFormAct({...formAct, em: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" className={`w-full text-white font-black py-4 rounded-2xl shadow-xl ${editingActId ? 'bg-blue-500' : 'bg-orange-500'}`}>
                                            {editingActId ? '💾 儲存修改' : '➕ 存入時程'}
                                        </button>
                                    </form>
                                </section>

                                {/* Stage Mgmt */}
                                <section className="mb-10">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">舞台設定</h3>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {stages.map(s => (
                                            <div key={s.id} className="bg-white border-2 px-3 py-1.5 rounded-full text-[10px] font-black flex items-center gap-2 shadow-sm" style={{ borderColor: s.color }}>
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                                <button onClick={() => deleteStage(s.id)} className="opacity-30">🗑️</button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[24px] space-y-4">
                                        <input id="s-name" type="text" placeholder="舞台名稱..." className="w-full bg-white border-none rounded-xl px-4 py-3 text-sm font-bold shadow-sm" />
                                        <div className="flex flex-wrap gap-2">
                                            {PRESET_COLORS.map(c => (
                                                <button key={c} onClick={() => window._selColor = c} className="w-8 h-8 rounded-full border-2 border-white focus:ring-4 focus:ring-black transition-all" style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        <button onClick={() => { const n = document.getElementById('s-name').value; if(n) setStages([...stages, { id: Date.now().toString(), name: n, color: window._selColor || '#000' }]); document.getElementById('s-name').value=''; }} className="w-full bg-black text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg shadow-slate-300">新增舞台</button>
                                    </div>
                                </section>

                                {/* Backup Section */}
                                <section className="mb-10 bg-slate-900 text-white p-6 rounded-[32px] shadow-xl">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">💾 數據備份與還原</h3>
                                    <p className="text-[10px] text-slate-400 mb-4">將此代碼備份到 Line 或記事本，換手機時可貼上還原。</p>
                                    <textarea 
                                        className="w-full h-24 bg-slate-800 rounded-xl p-3 text-[10px] font-mono text-slate-300 border-none mb-4"
                                        placeholder="在此貼上備份代碼進行還原..."
                                        value={backupData}
                                        onChange={(e) => setBackupData(e.target.value)}
                                    ></textarea>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={handleExport} className="bg-slate-700 py-3 rounded-xl font-black text-xs">產出備份代碼</button>
                                        <button onClick={handleImport} className="bg-blue-600 py-3 rounded-xl font-black text-xs">還原資料</button>
                                    </div>
                                </section>

                                {/* List Mgmt */}
                                <section>
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">演出管理列表 ({acts.length})</h3>
                                    <div className="space-y-2">
                                        {acts.sort((a,b)=>timeToMinutes(a.startTime)-timeToMinutes(b.startTime)).map(a => (
                                            <div key={a.id} className="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-transparent hover:border-slate-200">
                                                <div>
                                                    <p className="text-[10px] font-bold text-slate-400">{a.day} | {stages.find(s=>s.id===a.stageId)?.name}</p>
                                                    <p className="font-bold text-sm">{a.startTime} {a.name}</p>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => startEditAct(a)} className="text-blue-500 font-bold text-xs">✏️</button>
                                                    <button onClick={() => deleteAct(a.id)} className="text-red-400 font-bold text-xs">🗑️</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
