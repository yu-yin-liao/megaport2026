<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>2026 大港時程表</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overflow-x: hidden; }
        /* 縮放滑桿樣式 */
        .zoom-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #000; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TIME_STEP = 10; 
        const PRESET_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899', '#64748B', '#000000'];

        const timeToMinutes = (time) => {
            if(!time) return 0;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (totalMinutes) => {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        function App() {
            const [stages, setStages] = useState([]);
            const [acts, setActs] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [activeTab, setActiveTab] = useState('explore');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState('');
            const [activeStageId, setActiveStageId] = useState('');
            const [gridZoom, setGridZoom] = useState(1); // 1 = 100%
            
            const [editingActId, setEditingActId] = useState(null);
            const [formAct, setFormAct] = useState({ day: '', stageId: '', name: '', sh: '12', sm: '00', eh: '13', em: '00' });
            const [backupData, setBackupData] = useState('');

            const STORAGE_KEY = 'megaport_v8_data';

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStages(parsed.stages || []);
                    setActs(parsed.acts || []);
                    setSelectedIds(parsed.selectedIds || []);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ stages, acts, selectedIds }));
            }, [stages, acts, selectedIds]);

            const availableDays = useMemo(() => Array.from(new Set(acts.map(a => a.day))).sort(), [acts]);
            
            useEffect(() => {
                if (!currentDay && availableDays.length > 0) setCurrentDay(availableDays[0]);
                if (!activeStageId && stages.length > 0) setActiveStageId(stages[0].id);
            }, [availableDays, stages]);

            // --- 修改後的時間軸範圍邏輯 ---
            const dayRange = useMemo(() => {
                const dayActs = acts.filter(a => a.day === currentDay);
                if (dayActs.length === 0) return { start: 660, end: 1320 }; // 11:00 - 22:00
                
                const starts = dayActs.map(a => timeToMinutes(a.startTime));
                const ends = dayActs.map(a => timeToMinutes(a.endTime));
                
                let minTime = Math.floor(Math.min(...starts) / 60) * 60;
                let maxTime = Math.ceil(Math.max(...ends) / 60) * 60;
                
                // 保底邏輯：至少顯示 10 小時，或至少顯示到晚上 22:00
                if (maxTime - minTime < 600) maxTime = minTime + 600;
                if (maxTime < 1320) maxTime = 1320; 

                return { start: minTime, end: maxTime };
            }, [acts, currentDay]);

            const handleActSubmit = (e) => {
                e.preventDefault();
                const newAct = { id: editingActId || Date.now().toString(), day: formAct.day, stageId: formAct.stageId, name: formAct.name, startTime: `${formAct.sh}:${formAct.sm}`, endTime: `${formAct.eh}:${formAct.em}` };
                if (editingActId) { setActs(acts.map(a => a.id === editingActId ? newAct : a)); setEditingActId(null); } 
                else { setActs([...acts, newAct]); }
                setFormAct({ ...formAct, name: '' });
            };

            const togglePick = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            return (
                <div className="min-h-screen pb-24 font-sans antialiased bg-slate-50">
                    <header className="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex flex-col">
                            <span className="font-black text-xl">2026 大港時程表</span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Master Edition v8</span>
                        </div>
                        <button onClick={() => setIsAdminOpen(true)} className="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center">⚙️</button>
                    </header>

                    <nav className="flex bg-white border-b sticky top-[68px] z-40">
                        <button onClick={() => setActiveTab('explore')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'explore' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📂 舞台</button>
                        <button onClick={() => setActiveTab('matrix')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'matrix' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📅 總表</button>
                        <button onClick={() => setActiveTab('picks')} className={`flex-1 py-4 text-center text-xs font-bold ${activeTab === 'picks' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📝 時程表</button>
                    </nav>

                    <main className="p-4">
                        {activeTab === 'explore' && (
                            <div className="max-w-md mx-auto space-y-4">
                                {availableDays.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-2">
                                        {availableDays.map(day => (
                                            <button key={day} onClick={() => setCurrentDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-black border-2 ${currentDay === day ? 'bg-black text-white' : 'bg-white text-slate-400'}`}>{day}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {stages.map(s => (
                                        <button key={s.id} onClick={() => setActiveStageId(s.id)} className={`px-4 py-2 rounded-xl text-xs font-black border-2 flex items-center gap-2 ${activeStageId === s.id ? 'border-black bg-white shadow-sm' : 'border-slate-100 text-slate-400'}`}>
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {acts.filter(a => a.day === currentDay && a.stageId === activeStageId).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map(act => (
                                        <div key={act.id} onClick={() => togglePick(act.id)} className={`p-5 rounded-[24px] border-2 flex items-center justify-between bg-white transition-all active:scale-95 ${selectedIds.includes(act.id) ? 'border-slate-900 shadow-xl' : 'border-transparent shadow-sm'}`}>
                                            <div>
                                                <div className="text-[10px] font-black px-2 py-0.5 rounded-md inline-block mb-1" style={{ backgroundColor: `${stages.find(s=>s.id===act.stageId)?.color}20`, color: stages.find(s=>s.id===act.stageId)?.color }}>{act.startTime} - {act.endTime}</div>
                                                <h3 className="font-bold text-lg">{act.name}</h3>
                                            </div>
                                            <div className={`w-8 h-8 rounded-full border flex items-center justify-center ${selectedIds.includes(act.id) ? 'bg-black text-white text-xs' : 'text-transparent'}`}>✅</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'matrix' && (
                            <div className="space-y-4">
                                {/* 縮放控制條 */}
                                <div className="bg-white p-4 rounded-2xl border flex items-center gap-4 shadow-sm">
                                    <span className="text-xs font-bold text-slate-400">縮放</span>
                                    <input type="range" min="0.5" max="2" step="0.1" value={gridZoom} onChange={e => setGridZoom(parseFloat(e.target.value))} className="zoom-slider flex-1" />
                                    <span className="text-[10px] font-mono font-bold w-10 text-center">{Math.round(gridZoom * 100)}%</span>
                                </div>

                                <div className="overflow-auto border-2 border-slate-900 rounded-[32px] bg-white relative shadow-2xl no-scrollbar" style={{ maxHeight: 'calc(100vh - 250px)' }}>
                                    <div className="grid origin-top-left transition-transform duration-200" style={{ 
                                        gridTemplateColumns: `60px repeat(${stages.length}, ${100 * gridZoom}px)`, 
                                        gridTemplateRows: `50px repeat(${(dayRange.end - dayRange.start) / TIME_STEP}, ${25 * gridZoom}px)` 
                                    }}>
                                        {/* Sticky Time Header */}
                                        <div className="sticky top-0 left-0 bg-slate-900 z-40 flex items-center justify-center text-[8px] text-white font-black italic border-r border-b border-slate-800">TIME</div>
                                        
                                        {/* Sticky Stage Headers */}
                                        {stages.map(s => (
                                            <div key={s.id} className="sticky top-0 bg-slate-900 text-white text-[9px] font-black flex flex-col items-center justify-center z-30 border-l border-b border-slate-800 px-1 text-center">
                                                <div className="w-1.5 h-1.5 rounded-full mb-1" style={{ backgroundColor: s.color }} />
                                                {s.name}
                                            </div>
                                        ))}

                                        {/* Sticky Time Sidebar */}
                                        {Array.from({ length: (dayRange.end - dayRange.start) / TIME_STEP }).map((_, i) => (
                                            <div key={i} className="sticky left-0 bg-slate-50 border-r border-b text-[8px] font-black flex items-center justify-center text-slate-400 z-20 font-mono">
                                                {minutesToTime(dayRange.start + (i * TIME_STEP))}
                                            </div>
                                        ))}

                                        {/* Performance Blocks */}
                                        {acts.filter(a => a.day === currentDay).map(act => {
                                            const stage = stages.find(s => s.id === act.stageId);
                                            const isPicked = selectedIds.includes(act.id);
                                            const colIdx = stages.findIndex(s=>s.id===act.stageId);
                                            if (colIdx === -1) return null;
                                            return (
                                                <div key={act.id} onClick={() => togglePick(act.id)} className={`m-[1px] p-1 rounded-md flex flex-col items-center justify-center text-center border-2 transition-all ${isPicked ? 'z-10 opacity-100 shadow-md' : 'opacity-10 grayscale pointer-events-none'}`} style={{ 
                                                    gridRowStart: (timeToMinutes(act.startTime)-dayRange.start)/TIME_STEP+2, 
                                                    gridRowEnd: (timeToMinutes(act.endTime)-dayRange.start)/TIME_STEP+2, 
                                                    gridColumnStart: colIdx+2, 
                                                    backgroundColor: `${stage?.color}20`, 
                                                    borderColor: stage?.color, 
                                                    color: stage?.color,
                                                    fontSize: `${7 * gridZoom}px` // 團名隨縮放調整大小
                                                }}>
                                                    <div className="font-mono font-black opacity-80 mb-0.5" style={{ fontSize: `${6 * gridZoom}px` }}>
                                                        {act.startTime}-{act.endTime}
                                                    </div>
                                                    <div className="font-black leading-tight truncate w-full">{act.name}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && (
                            <div className="max-w-md mx-auto space-y-4">
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map((act, idx, arr) => {
                                    const stage = stages.find(s => s.id === act.stageId);
                                    const conflict = arr[idx-1] && timeToMinutes(act.startTime) < timeToMinutes(arr[idx-1].endTime);
                                    return (
                                        <div key={act.id} className={`p-6 rounded-[32px] bg-white border-2 ${conflict ? 'border-red-500 bg-red-50' : 'border-white shadow-md'}`}>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black font-mono bg-black text-white px-3 py-1 rounded-full">{act.startTime} - {act.endTime}</span>
                                                    {conflict && <span className="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full font-black animate-pulse">⚠️ 衝突</span>}
                                                </div>
                                                <h3 className="text-xl font-black">{act.name}</h3>
                                                <div className="text-[10px] font-black uppercase tracking-widest flex items-center gap-1" style={{ color: stage?.color }}>📍 {stage?.name}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* Admin/Backup Drawer (省略部分重複內容以保持精簡，功能同 v7) */}
                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-8 max-h-[95vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black italic">CONFIG</h2>
                                    <button onClick={() => setIsAdminOpen(false)} className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center">❌</button>
                                </div>
                                {/* 這裡可以放入之前的 FormAct, StageMgmt, Backup 區塊 */}
                                <p className="text-xs font-bold text-slate-400 mb-4">請依照原 v7 流程輸入資料與進行備份</p>
                                <form className="space-y-4" onSubmit={handleActSubmit}>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" value={formAct.day} onChange={e=>setFormAct({...formAct, day: e.target.value})} required className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                        <select value={formAct.stageId} onChange={e=>setFormAct({...formAct, stageId: e.target.value})} required className="bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none">
                                            <option value="">選擇舞台</option>
                                            {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <input placeholder="樂團名稱" value={formAct.name} onChange={e=>setFormAct({...formAct, name: e.target.value})} required className="w-full bg-slate-50 rounded-xl px-4 py-3 text-xs font-bold border-none" />
                                    <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-2xl text-center">
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 mb-2 uppercase">Start</p>
                                            <div className="flex gap-1">
                                                <select value={formAct.sh} onChange={e=>setFormAct({...formAct, sh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                <select value={formAct.sm} onChange={e=>setFormAct({...formAct, sm: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 mb-2 uppercase">End</p>
                                            <div className="flex gap-1">
                                                <select value={formAct.eh} onChange={e=>setFormAct({...formAct, eh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                <select value={formAct.em} onChange={e=>setFormAct({...formAct, em: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full bg-black text-white font-black py-4 rounded-2xl shadow-xl">存入時程</button>
                                </form>
                                {/* 下方可續接 StageMgmt, Backup 等區塊... */}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
