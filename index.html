<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>2026 大港時程表</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overflow-x: hidden; }
        .zoom-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #000; border-radius: 50%; cursor: pointer; }
        .matrix-container { overflow: auto; border-radius: 24px; position: relative; }
        select, input, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 自定義圖標元件 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.72l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                close: <path d="M18 6L6 18M6 6l12 12"/>,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const TIME_STEP = 10; 
        const PRESET_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899', '#64748B', '#000000'];

        const timeToMinutes = (time) => {
            if(!time) return 0;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (totalMinutes) => {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        function App() {
            // Data State
            const [stages, setStages] = useState([]);
            const [acts, setActs] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            
            // UI State
            const [activeTab, setActiveTab] = useState('explore');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState('');
            const [activeStageId, setActiveStageId] = useState('');
            const [gridZoom, setGridZoom] = useState(1);
            
            // Edit/Backup State
            const [editingActId, setEditingActId] = useState(null);
            const [formAct, setFormAct] = useState({ day: '', stageId: '', name: '', sh: '12', sm: '00', eh: '13', em: '00' });
            const [backupData, setBackupData] = useState('');

            const STORAGE_KEY = 'megaport_v9_final';

            // Persistence
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStages(parsed.stages || []);
                    setActs(parsed.acts || []);
                    setSelectedIds(parsed.selectedIds || []);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ stages, acts, selectedIds }));
            }, [stages, acts, selectedIds]);

            const availableDays = useMemo(() => Array.from(new Set(acts.map(a => a.day))).sort(), [acts]);
            
            useEffect(() => {
                if (!currentDay && availableDays.length > 0) setCurrentDay(availableDays[0]);
                if (!activeStageId && stages.length > 0) setActiveStageId(stages[0].id);
            }, [availableDays, stages]);

            const dayRange = useMemo(() => {
                const dayActs = acts.filter(a => a.day === currentDay);
                if (dayActs.length === 0) return { start: 660, end: 1320 };
                const starts = dayActs.map(a => timeToMinutes(a.startTime));
                const ends = dayActs.map(a => timeToMinutes(a.endTime));
                let minTime = Math.floor(Math.min(...starts) / 60) * 60;
                let maxTime = Math.ceil(Math.max(...ends) / 60) * 60;
                if (maxTime - minTime < 600) maxTime = minTime + 600;
                if (maxTime < 1320) maxTime = 1320; 
                return { start: minTime, end: maxTime };
            }, [acts, currentDay]);

            // --- CRUD Handlers ---
            const handleActSubmit = (e) => {
                e.preventDefault();
                const newAct = {
                    id: editingActId || Date.now().toString(),
                    day: formAct.day,
                    stageId: formAct.stageId,
                    name: formAct.name,
                    startTime: `${formAct.sh}:${formAct.sm}`,
                    endTime: `${formAct.eh}:${formAct.em}`
                };
                if (editingActId) {
                    setActs(acts.map(a => a.id === editingActId ? newAct : a));
                    setEditingActId(null);
                    alert('演出資料已更新');
                } else {
                    setActs([...acts, newAct]);
                }
                setFormAct({ ...formAct, name: '' });
            };

            const startEditAct = (act) => {
                const [sh, sm] = act.startTime.split(':');
                const [eh, em] = act.endTime.split(':');
                setFormAct({ day: act.day, stageId: act.stageId, name: act.name, sh, sm, eh, em });
                setEditingActId(act.id);
                // 滑動至頂部表單
                document.getElementById('admin-drawer')?.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const deleteAct = (id) => {
                if(window.confirm('⚠️ 確定要刪除這場演出嗎？此操作無法復原。')) {
                    setActs(acts.filter(a => a.id !== id));
                    setSelectedIds(selectedIds.filter(sid => sid !== id));
                }
            };

            const deleteStage = (id) => {
                if(window.confirm('🔥 警告：刪除舞台將連同該舞台下的所有演出一併永久刪除！確定執行嗎？')) {
                    setStages(stages.filter(s => s.id !== id));
                    setActs(acts.filter(a => a.stageId !== id));
                }
            };

            // --- Backup Logic ---
            const handleExport = () => {
                const str = JSON.stringify({ stages, acts, selectedIds });
                setBackupData(str);
                alert('備份代碼已產生，請複製下方文字框內容。');
            };

            const handleImport = () => {
                if(!backupData) return alert('請先貼上備份代碼');
                if(window.confirm('🚨 警告：匯入將覆蓋目前所有資料！確定嗎？')) {
                    try {
                        const p = JSON.parse(backupData);
                        setStages(p.stages || []);
                        setActs(p.acts || []);
                        setSelectedIds(p.selectedIds || []);
                        alert('還原成功！');
                        setBackupData('');
                    } catch(e) { alert('無效的備份代碼'); }
                }
            };

            const togglePick = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            return (
                <div className="min-h-screen pb-24 font-sans select-none">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex flex-col">
                            <span className="font-black text-xl tracking-tighter">2026 大港時程表</span>
                            <span className="text-[10px] text-orange-500 font-bold uppercase tracking-widest flex items-center gap-1">
                                <span className="w-1.5 h-1.5 bg-orange-500 rounded-full animate-pulse"></span> v9 Strategic Edition
                            </span>
                        </div>
                        <button onClick={() => setIsAdminOpen(true)} className="p-3 bg-slate-100 rounded-2xl active:scale-90 transition-all">
                            <Icon name="settings" size={20} />
                        </button>
                    </header>

                    {/* Navbar */}
                    <nav className="flex bg-white/80 backdrop-blur-md border-b sticky top-[69px] z-40">
                        <button onClick={() => setActiveTab('explore')} className={`flex-1 py-4 text-xs font-black uppercase ${activeTab === 'explore' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📂 舞台</button>
                        <button onClick={() => setActiveTab('matrix')} className={`flex-1 py-4 text-xs font-black uppercase ${activeTab === 'matrix' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📅 總表</button>
                        <button onClick={() => setActiveTab('picks')} className={`flex-1 py-4 text-xs font-black uppercase ${activeTab === 'picks' ? 'text-black border-b-4 border-black' : 'text-slate-300'}`}>📝 時程表</button>
                    </nav>

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'explore' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                {availableDays.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                        {availableDays.map(day => (
                                            <button key={day} onClick={() => setCurrentDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-black border-2 transition-all ${currentDay === day ? 'bg-black border-black text-white shadow-md' : 'bg-white border-slate-200 text-slate-400'}`}>{day}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {stages.map(s => (
                                        <button key={s.id} onClick={() => setActiveStageId(s.id)} className={`px-4 py-2 rounded-xl text-xs font-black border-2 flex items-center gap-2 transition-all ${activeStageId === s.id ? 'border-black bg-white shadow-md' : 'border-slate-100 text-slate-400'}`}>
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {acts.filter(a => a.day === currentDay && a.stageId === activeStageId).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map(act => (
                                        <div key={act.id} onClick={() => togglePick(act.id)} className={`p-5 rounded-[28px] border-2 flex items-center justify-between bg-white active:scale-95 transition-all ${selectedIds.includes(act.id) ? 'border-black shadow-xl ring-4 ring-slate-50' : 'border-transparent shadow-sm'}`}>
                                            <div>
                                                <div className="text-[10px] font-black px-2 py-0.5 rounded-md inline-block mb-1" style={{ backgroundColor: `${stages.find(s=>s.id===act.stageId)?.color}20`, color: stages.find(s=>s.id===act.stageId)?.color }}>{act.startTime} — {act.endTime}</div>
                                                <h3 className="font-bold text-lg leading-tight">{act.name}</h3>
                                            </div>
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${selectedIds.includes(act.id) ? 'bg-black border-black text-white' : 'border-slate-100 text-transparent'}`}><Icon name="check" size={14}/></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'matrix' && (
                            <div className="space-y-4 animate-in zoom-in duration-300">
                                <div className="bg-white p-4 rounded-[24px] border flex items-center gap-4 shadow-sm">
                                    <span className="text-[10px] font-black text-slate-400 uppercase">Zoom</span>
                                    <input type="range" min="0.6" max="1.8" step="0.1" value={gridZoom} onChange={e => setGridZoom(parseFloat(e.target.value))} className="zoom-slider flex-1" />
                                    <span className="text-[10px] font-mono font-bold w-12 text-center bg-slate-100 rounded-md py-1">{Math.round(gridZoom * 100)}%</span>
                                </div>

                                <div className="matrix-container border-2 border-black bg-white shadow-2xl no-scrollbar" style={{ maxHeight: 'calc(100vh - 280px)' }}>
                                    <div className="grid transition-all duration-200" style={{ 
                                        gridTemplateColumns: `50px repeat(${stages.length}, ${90 * gridZoom}px)`, 
                                        gridTemplateRows: `45px repeat(${(dayRange.end - dayRange.start) / TIME_STEP}, ${24 * gridZoom}px)` 
                                    }}>
                                        <div className="sticky top-0 left-0 bg-black z-40 flex items-center justify-center text-[8px] text-white font-black italic border-r border-b border-slate-800">TIME</div>
                                        {stages.map(s => (
                                            <div key={s.id} className="sticky top-0 bg-black text-white text-[9px] font-black flex flex-col items-center justify-center z-30 border-l border-b border-slate-800 px-1 text-center">
                                                <div className="w-1.5 h-1.5 rounded-full mb-1" style={{ backgroundColor: s.color }} />{s.name}
                                            </div>
                                        ))}
                                        {Array.from({ length: (dayRange.end - dayRange.start) / TIME_STEP }).map((_, i) => (
                                            <div key={i} className="sticky left-0 bg-slate-50 border-r border-b border-slate-100 text-[8px] font-black flex items-center justify-center text-slate-400 z-20 font-mono">
                                                {minutesToTime(dayRange.start + (i * TIME_STEP))}
                                            </div>
                                        ))}
                                        {acts.filter(a => a.day === currentDay).map(act => {
                                            const stage = stages.find(s => s.id === act.stageId);
                                            const isPicked = selectedIds.includes(act.id);
                                            const colIdx = stages.findIndex(s=>s.id===act.stageId);
                                            if (colIdx === -1) return null;
                                            return (
                                                <div key={act.id} onClick={() => togglePick(act.id)} className={`m-[1px] p-1 rounded-lg flex flex-col items-center justify-center text-center border-2 transition-all ${isPicked ? 'z-10 shadow-lg' : 'opacity-20 grayscale pointer-events-none'}`} style={{ 
                                                    gridRowStart: (timeToMinutes(act.startTime)-dayRange.start)/TIME_STEP+2, 
                                                    gridRowEnd: (timeToMinutes(act.endTime)-dayRange.start)/TIME_STEP+2, 
                                                    gridColumnStart: colIdx+2, 
                                                    backgroundColor: `${stage?.color}15`, 
                                                    borderColor: stage?.color, 
                                                    color: stage?.color,
                                                    fontSize: `${7.5 * gridZoom}px`
                                                }}>
                                                    <div className="font-mono font-black opacity-70 mb-0.5" style={{ fontSize: `${6 * gridZoom}px` }}>{act.startTime}-{act.endTime}</div>
                                                    <div className="font-black leading-tight truncate w-full">{act.name}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom duration-300">
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map((act, idx, arr) => {
                                    const stage = stages.find(s => s.id === act.stageId);
                                    const conflict = arr[idx-1] && timeToMinutes(act.startTime) < timeToMinutes(arr[idx-1].endTime);
                                    return (
                                        <div key={act.id} className={`p-6 rounded-[32px] bg-white border-2 shadow-xl ${conflict ? 'border-red-500 bg-red-50' : 'border-white'}`}>
                                            <div className="flex flex-col gap-2">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black font-mono bg-black text-white px-3 py-1 rounded-full">{act.startTime} — {act.endTime}</span>
                                                    {conflict && <span className="text-[10px] bg-red-500 text-white px-3 py-1 rounded-full font-black animate-bounce tracking-widest uppercase">Conflict</span>}
                                                </div>
                                                <h3 className="text-xl font-black italic tracking-tighter">{act.name}</h3>
                                                <div className="text-[10px] font-black uppercase tracking-[0.2em] flex items-center gap-1" style={{ color: stage?.color }}>📍 {stage?.name}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).length === 0 && (
                                    <div className="text-center py-24 opacity-10 font-black italic text-5xl rotate-[-5deg]">EMPTY PLAN</div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Admin Drawer */}
                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-end">
                            <div id="admin-drawer" className="bg-white w-full rounded-t-[40px] p-8 max-h-[92vh] overflow-y-auto shadow-2xl ring-1 ring-black/5 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8 sticky top-0 bg-white z-10 py-2 border-b">
                                    <h2 className="text-2xl font-black italic tracking-tighter">{editingActId ? '✏️ EDIT ACT' : '⚙️ CONFIG'}</h2>
                                    <button onClick={() => { setIsAdminOpen(false); setEditingActId(null); }} className="p-3 bg-slate-100 rounded-2xl active:scale-90"><Icon name="close" /></button>
                                </div>

                                {/* Form Section */}
                                <section className="mb-10 bg-slate-50 p-6 rounded-[32px] shadow-inner">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">{editingActId ? '修正演出資訊' : '新增演出時程'}</h3>
                                    <form className="space-y-4" onSubmit={handleActSubmit}>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="date" value={formAct.day} onChange={e=>setFormAct({...formAct, day: e.target.value})} required className="bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm" />
                                            <select value={formAct.stageId} onChange={e=>setFormAct({...formAct, stageId: e.target.value})} required className="bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm">
                                                <option value="">選擇舞台</option>
                                                {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        <input placeholder="演出單位名稱" value={formAct.name} onChange={e=>setFormAct({...formAct, name: e.target.value})} required className="w-full bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-center text-slate-400">START</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.sh} onChange={e=>setFormAct({...formAct, sh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.sm} onChange={e=>setFormAct({...formAct, sm: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <p className="text-[9px] font-black text-center text-slate-400">END</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.eh} onChange={e=>setFormAct({...formAct, eh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.em} onChange={e=>setFormAct({...formAct, em: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" className={`w-full text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 ${editingActId ? 'bg-blue-600 shadow-blue-200' : 'bg-orange-600 shadow-orange-200'}`}>
                                            {editingActId ? <Icon name="edit" size={18}/> : <PlusIcon/>} {editingActId ? '確認修改內容' : '加入演出時程'}
                                        </button>
                                        {editingActId && <button type="button" onClick={()=>{setEditingActId(null); setFormAct({...formAct, name: ''});}} className="w-full text-slate-400 font-bold text-xs py-2">取消並重新新增</button>}
                                    </form>
                                </section>

                                {/* Stage Mgmt */}
                                <section className="mb-12">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-[0.2em]">1. 舞台定義與顏色</h3>
                                    <div className="flex flex-wrap gap-2 mb-6">
                                        {stages.map(s => (
                                            <div key={s.id} className="bg-white border-2 px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm transition-all" style={{ borderColor: s.color }}>
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                                <button onClick={() => deleteStage(s.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[32px] space-y-4">
                                        <input id="s-name" type="text" placeholder="輸入舞台名稱..." className="w-full bg-white border-none rounded-xl px-4 py-3 text-sm font-bold shadow-sm" />
                                        <div className="flex flex-wrap gap-2 justify-center">
                                            {PRESET_COLORS.map(c => (
                                                <button key={c} onClick={() => window._selColor = c} className="w-9 h-9 rounded-full border-4 border-white focus:ring-4 focus:ring-black transition-all shadow-sm" style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        <button onClick={() => { const n = document.getElementById('s-name').value; if(n) setStages([...stages, { id: Date.now().toString(), name: n, color: window._selColor || '#000' }]); document.getElementById('s-name').value=''; }} className="w-full bg-black text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">建立新舞台</button>
                                    </div>
                                </section>

                                {/* Backup Section */}
                                <section className="mb-12 bg-black text-white p-8 rounded-[40px] shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="settings" size={100}/></div>
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">💾 DATA PORTABILITY / 資料保險</h3>
                                    <p className="text-[10px] text-slate-400 mb-6 leading-relaxed italic">產出代碼後傳至 Line 記事本。更換設備時，在此處貼上代碼並還原。</p>
                                    <textarea 
                                        className="w-full h-28 bg-white/5 rounded-2xl p-4 text-[10px] font-mono text-slate-300 border-none mb-4 ring-1 ring-white/10 focus:ring-orange-500 transition-all"
                                        placeholder="在此貼上備份代碼進行災難還原..."
                                        value={backupData}
                                        onChange={(e) => setBackupData(e.target.value)}
                                    ></textarea>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={handleExport} className="bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-black text-xs transition-all">產出備份代碼</button>
                                        <button onClick={handleImport} className="bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-black text-xs shadow-lg shadow-orange-900/40 transition-all">執行資料還原</button>
                                    </div>
                                </section>

                                {/* Delete Management List */}
                                <section className="pb-10">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest underline underline-offset-4">2. 管理演出項目列表 ({acts.length})</h3>
                                    <div className="space-y-3">
                                        {acts.sort((a,b)=>timeToMinutes(a.startTime)-timeToMinutes(b.startTime)).map(a => (
                                            <div key={a.id} className="flex justify-between items-center bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-[9px] font-bold text-slate-400">{a.day}</span>
                                                        <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: stages.find(s=>s.id===a.stageId)?.color }} />
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{stages.find(s=>s.id===a.stageId)?.name}</span>
                                                    </div>
                                                    <p className="font-black text-sm">{a.startTime} {a.name}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => startEditAct(a)} className="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 rounded-xl active:scale-90"><Icon name="edit" size={16}/></button>
                                                    <button onClick={() => deleteAct(a.id)} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-600 rounded-xl active:scale-90"><Icon name="trash" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const PlusIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
