<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>2026 大港時程表</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overflow-x: hidden; }
        .zoom-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #000; border-radius: 50%; cursor: pointer; }
        .matrix-container { overflow: auto; border-radius: 24px; position: relative; }
        select, input, textarea { font-size: 16px !important; }
        .conflict-glow { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 修復後的圖標元件 (Fixed Adjacent JSX Error) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.72l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>,
                close: <path d="M18 6L6 18M6 6l12 12"/>,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>,
                alert: <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/>,
                grid: <path d="M3 3h7v7H3zm11 0h7v7h-7zm0 11h7v7h-7zm-11 0h7v7H3z"/>,
                list: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>,
                calendar: <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/>,
                save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const TIME_STEP = 10; 
        const PRESET_COLORS = ['#EF4444', '#F97316', '#F59E0B', '#10B981', '#06B6D4', '#3B82F6', '#8B5CF6', '#EC4899', '#64748B', '#000000'];

        const timeToMinutes = (time) => {
            if(!time) return 0;
            const [h, m] = time.split(':').map(Number);
            return h * 60 + m;
        };

        const minutesToTime = (totalMinutes) => {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        function App() {
            const [stages, setStages] = useState([]);
            const [acts, setActs] = useState([]);
            const [selectedIds, setSelectedIds] = useState([]);
            const [activeTab, setActiveTab] = useState('explore');
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [currentDay, setCurrentDay] = useState('');
            const [activeStageId, setActiveStageId] = useState('');
            const [gridZoom, setGridZoom] = useState(1);
            const [editingActId, setEditingActId] = useState(null);
            const [formAct, setFormAct] = useState({ day: '', stageId: '', name: '', sh: '12', sm: '00', eh: '13', em: '00' });
            const [backupData, setBackupData] = useState('');

            const STORAGE_KEY = 'megaport_v12_final';

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStages(parsed.stages || []);
                    setActs(parsed.acts || []);
                    setSelectedIds(parsed.selectedIds || []);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ stages, acts, selectedIds }));
            }, [stages, acts, selectedIds]);

            const availableDays = useMemo(() => Array.from(new Set(acts.map(a => a.day))).sort(), [acts]);
            
            useEffect(() => {
                if (!currentDay && availableDays.length > 0) setCurrentDay(availableDays[0]);
                if (!activeStageId && stages.length > 0) setActiveStageId(stages[0].id);
            }, [availableDays, stages]);

            const dayRange = useMemo(() => {
                const dayActs = acts.filter(a => a.day === currentDay);
                if (dayActs.length === 0) return { start: 660, end: 1320 };
                const starts = dayActs.map(a => timeToMinutes(a.startTime));
                const ends = dayActs.map(a => timeToMinutes(a.endTime));
                let minTime = Math.floor(Math.min(...starts) / 60) * 60;
                let maxTime = Math.ceil(Math.max(...ends) / 60) * 60;
                if (maxTime - minTime < 600) maxTime = minTime + 600;
                if (maxTime < 1320) maxTime = 1320; 
                return { start: minTime, end: maxTime };
            }, [acts, currentDay]);

            // --- 進階衝突偵測 (Symmetric Detection & Overlap Details) ---
            const detailedConflicts = useMemo(() => {
                const pickedActs = acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay);
                const conflictMap = {}; 

                for (let i = 0; i < pickedActs.length; i++) {
                    for (let j = i + 1; j < pickedActs.length; j++) {
                        const a = pickedActs[i];
                        const b = pickedActs[j];
                        const sA = timeToMinutes(a.startTime);
                        const eA = timeToMinutes(a.endTime);
                        const sB = timeToMinutes(b.startTime);
                        const eB = timeToMinutes(b.endTime);

                        if (Math.max(sA, sB) < Math.min(eA, eB)) {
                            const oStart = Math.max(sA, sB);
                            const oEnd = Math.min(eA, eB);
                            const rangeStr = `${minutesToTime(oStart)}-${minutesToTime(oEnd)}`;
                            
                            let type = "部分重疊";
                            if (sA === sB && eA === eB) type = "完全衝突";
                            else if ((sA <= sB && eA >= eB) || (sB <= sA && eB >= eA)) type = "完全包含";

                            if (!conflictMap[a.id]) conflictMap[a.id] = [];
                            if (!conflictMap[b.id]) conflictMap[b.id] = [];
                            
                            conflictMap[a.id].push({ type, range: rangeStr, with: b.name });
                            conflictMap[b.id].push({ type, range: rangeStr, with: a.name });
                        }
                    }
                }
                return conflictMap;
            }, [acts, selectedIds, currentDay]);

            const handleActSubmit = (e) => {
                e.preventDefault();
                const newAct = { id: editingActId || Date.now().toString(), day: formAct.day, stageId: formAct.stageId, name: formAct.name, startTime: `${formAct.sh}:${formAct.sm}`, endTime: `${formAct.eh}:${formAct.em}` };
                if (editingActId) { setActs(acts.map(a => a.id === editingActId ? newAct : a)); setEditingActId(null); } 
                else { setActs([...acts, newAct]); }
                setFormAct({ ...formAct, name: '' });
            };

            const togglePick = (id) => setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            return (
                <div className="min-h-screen pb-24 font-sans select-none antialiased">
                    <header className="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex flex-col">
                            <span className="font-black text-xl tracking-tighter text-slate-900 uppercase">2026 大港時程表</span>
                            <span className="text-[10px] text-indigo-600 font-bold uppercase tracking-[0.2em] flex items-center gap-1">
                                <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span> Perfect Sync v12
                            </span>
                        </div>
                        <button onClick={() => setIsAdminOpen(true)} className="p-3 bg-slate-100 rounded-2xl active:scale-90 transition-all">
                            <Icon name="settings" size={20} />
                        </button>
                    </header>

                    <nav className="flex bg-white/80 backdrop-blur-md border-b sticky top-[69px] z-40">
                        <button onClick={() => setActiveTab('explore')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest ${activeTab === 'explore' ? 'text-indigo-600 border-b-4 border-indigo-600' : 'text-slate-300'}`}>📂 舞台</button>
                        <button onClick={() => setActiveTab('matrix')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest ${activeTab === 'matrix' ? 'text-indigo-600 border-b-4 border-indigo-600' : 'text-slate-300'}`}>📅 總表</button>
                        <button onClick={() => setActiveTab('picks')} className={`flex-1 py-4 text-xs font-black uppercase tracking-widest ${activeTab === 'picks' ? 'text-indigo-600 border-b-4 border-indigo-600' : 'text-slate-300'}`}>📝 時程表</button>
                    </nav>

                    <main className="p-4 max-w-md mx-auto">
                        {activeTab === 'explore' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="flex overflow-x-auto no-scrollbar py-1 gap-2">
                                    {availableDays.map(day => (
                                        <button key={day} onClick={() => setCurrentDay(day)} className={`px-4 py-1.5 rounded-full text-xs font-black border-2 transition-all ${currentDay === day ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-400'}`}>{day}</button>
                                    ))}
                                </div>
                                <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                                    {stages.map(s => (
                                        <button key={s.id} onClick={() => setActiveStageId(s.id)} className={`px-4 py-2 rounded-xl text-xs font-black border-2 flex items-center gap-2 transition-all ${activeStageId === s.id ? 'border-indigo-600 bg-white shadow-md' : 'border-slate-100 text-slate-400'}`}>
                                            <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                        </button>
                                    ))}
                                </div>
                                <div className="space-y-3">
                                    {acts.filter(a => a.day === currentDay && a.stageId === activeStageId).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map(act => (
                                        <div key={act.id} onClick={() => togglePick(act.id)} className={`p-5 rounded-[28px] border-2 flex items-center justify-between bg-white active:scale-95 transition-all ${selectedIds.includes(act.id) ? 'border-indigo-600 shadow-xl ring-4 ring-indigo-50' : 'border-transparent shadow-sm'}`}>
                                            <div>
                                                <div className="text-[10px] font-black px-2 py-0.5 rounded-md inline-block mb-1" style={{ backgroundColor: `${stages.find(s=>s.id===act.stageId)?.color}20`, color: stages.find(s=>s.id===act.stageId)?.color }}>{act.startTime} — {act.endTime}</div>
                                                <h3 className="font-bold text-lg leading-tight">{act.name}</h3>
                                            </div>
                                            <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${selectedIds.includes(act.id) ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-100 text-transparent'}`}><Icon name="check" size={14}/></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'matrix' && (
                            <div className="space-y-4 animate-in zoom-in duration-300">
                                <div className="bg-white p-4 rounded-[24px] border flex items-center gap-4 shadow-sm">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Zoom</span>
                                    <input type="range" min="0.6" max="1.8" step="0.1" value={gridZoom} onChange={e => setGridZoom(parseFloat(e.target.value))} className="zoom-slider flex-1" />
                                    <span className="text-[10px] font-mono font-bold w-12 text-center bg-slate-100 rounded-md py-1">{Math.round(gridZoom * 100)}%</span>
                                </div>

                                <div className="overflow-auto border-2 border-indigo-600 bg-white shadow-2xl no-scrollbar rounded-[24px]" style={{ maxHeight: 'calc(100vh - 280px)' }}>
                                    <div className="grid transition-all duration-200" style={{ 
                                        gridTemplateColumns: `50px repeat(${stages.length}, ${100 * gridZoom}px)`, 
                                        gridTemplateRows: `45px repeat(${(dayRange.end - dayRange.start) / TIME_STEP}, ${26 * gridZoom}px)` 
                                    }}>
                                        <div className="sticky top-0 left-0 bg-indigo-900 z-40 flex items-center justify-center text-[8px] text-white font-black italic border-r border-b border-indigo-800">TIME</div>
                                        {stages.map(s => (
                                            <div key={s.id} className="sticky top-0 bg-indigo-900 text-white text-[9px] font-black flex flex-col items-center justify-center z-30 border-l border-b border-indigo-800 px-1 text-center">
                                                <div className="w-1.5 h-1.5 rounded-full mb-1" style={{ backgroundColor: s.color }} />{s.name}
                                            </div>
                                        ))}
                                        {Array.from({ length: (dayRange.end - dayRange.start) / TIME_STEP }).map((_, i) => (
                                            <div key={i} className="sticky left-0 bg-slate-50 border-r border-b border-slate-100 text-[8px] font-black flex items-center justify-center text-slate-400 z-20 font-mono">
                                                {minutesToTime(dayRange.start + (i * TIME_STEP))}
                                            </div>
                                        ))}
                                        {acts.filter(a => a.day === currentDay).map(act => {
                                            const stage = stages.find(s => s.id === act.stageId);
                                            const isPicked = selectedIds.includes(act.id);
                                            const colIdx = stages.findIndex(s=>s.id===act.stageId);
                                            if (colIdx === -1) return null;
                                            
                                            const rStart = (timeToMinutes(act.startTime) - dayRange.start) / TIME_STEP + 2;
                                            const rEnd = (timeToMinutes(act.endTime) - dayRange.start) / TIME_STEP + 2;

                                            return (
                                                <div key={act.id} onClick={() => togglePick(act.id)} className={`m-[1px] p-1 rounded-lg flex flex-col items-center justify-center text-center border-2 transition-all ${isPicked ? 'z-10 shadow-lg' : 'opacity-20 grayscale pointer-events-none'}`} style={{ 
                                                    gridRowStart: rStart, 
                                                    gridRowEnd: rEnd, 
                                                    gridColumnStart: colIdx + 2, 
                                                    backgroundColor: `${stage?.color}15`, 
                                                    borderColor: stage?.color, 
                                                    color: stage?.color,
                                                    fontSize: `${8 * gridZoom}px`
                                                }}>
                                                    <div className="font-mono font-black opacity-70 mb-0.5" style={{ fontSize: `${6.5 * gridZoom}px` }}>{act.startTime}-{act.endTime}</div>
                                                    <div className="font-black leading-tight truncate w-full">{act.name}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom duration-300">
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).sort((a,b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime)).map((act) => {
                                    const stage = stages.find(s => s.id === act.stageId);
                                    const actConflicts = detailedConflicts[act.id] || [];
                                    const hasConflict = actConflicts.length > 0;
                                    
                                    return (
                                        <div key={act.id} className={`p-6 rounded-[32px] bg-white border-2 shadow-xl transition-all duration-300 ${hasConflict ? 'border-red-500 bg-red-50 conflict-glow' : 'border-white'}`}>
                                            <div className="flex flex-col gap-3">
                                                <div className="flex items-center justify-between">
                                                    <span className={`text-xs font-black font-mono px-3 py-1 rounded-full ${hasConflict ? 'bg-red-500 text-white shadow-md' : 'bg-slate-900 text-white'}`}>
                                                        {act.startTime} — {act.endTime}
                                                    </span>
                                                    <div className="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-slate-100" style={{ color: stage?.color }}>{stage?.name}</div>
                                                </div>
                                                
                                                <h3 className={`text-xl font-black italic tracking-tighter ${hasConflict ? 'text-red-700' : 'text-slate-900'}`}>{act.name}</h3>
                                                
                                                {hasConflict && (
                                                    <div className="space-y-2 pt-2 border-t border-red-200">
                                                        {actConflicts.map((c, i) => (
                                                            <div key={i} className="flex items-start gap-2 text-[10px] font-bold text-red-600">
                                                                <div className="mt-0.5 text-red-500"><Icon name="alert" size={10} /></div>
                                                                <div>
                                                                    <span className="font-black">[{c.type}]</span> {c.range} 與 <span className="underline decoration-red-300">[{c.with}]</span> 重疊
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                                {acts.filter(a => selectedIds.includes(a.id) && a.day === currentDay).length === 0 && (
                                    <div className="text-center py-24 opacity-10 font-black italic text-5xl rotate-[-5deg]">EMPTY PLAN</div>
                                )}
                            </div>
                        )}
                    </main>

                    {isAdminOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end">
                            <div id="admin-drawer" className="bg-white w-full rounded-t-[40px] p-8 max-h-[92vh] overflow-y-auto shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-8 sticky top-0 bg-white z-10 py-2 border-b">
                                    <h2 className="text-2xl font-black italic tracking-tighter uppercase">{editingActId ? '✏️ Edit Act' : '⚙️ Config'}</h2>
                                    <button onClick={() => { setIsAdminOpen(false); setEditingActId(null); }} className="p-3 bg-slate-100 rounded-2xl active:scale-90"><Icon name="close" /></button>
                                </div>

                                <section className="mb-10 bg-slate-50 p-6 rounded-[32px] shadow-inner">
                                    <form className="space-y-4" onSubmit={handleActSubmit}>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="date" value={formAct.day} onChange={e=>setFormAct({...formAct, day: e.target.value})} required className="bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm" />
                                            <select value={formAct.stageId} onChange={e=>setFormAct({...formAct, stageId: e.target.value})} required className="bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm">
                                                <option value="">選擇舞台</option>
                                                {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        <input placeholder="樂團單位名稱" value={formAct.name} onChange={e=>setFormAct({...formAct, name: e.target.value})} required className="w-full bg-white rounded-xl px-4 py-3 text-xs font-bold border-none shadow-sm" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2 text-center">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Start</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.sh} onChange={e=>setFormAct({...formAct, sh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.sm} onChange={e=>setFormAct({...formAct, sm: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                            <div className="space-y-2 text-center">
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">End</p>
                                                <div className="flex gap-1">
                                                    <select value={formAct.eh} onChange={e=>setFormAct({...formAct, eh: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')).map(h=><option key={h} value={h}>{h}</option>)}</select>
                                                    <select value={formAct.em} onChange={e=>setFormAct({...formAct, em: e.target.value})} className="flex-1 bg-white rounded-lg p-2 text-xs font-black shadow-sm">{['00','10','20','30','40','50'].map(m=><option key={m} value={m}>{m}</option>)}</select>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-xs uppercase tracking-widest">
                                            {editingActId ? <Icon name="save" size={16} className="inline mr-2" /> : '➕'} {editingActId ? '修改演出' : '加入演出'}
                                        </button>
                                    </form>
                                </section>

                                <section className="mb-12">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-[0.2em]">舞台管理</h3>
                                    <div className="flex flex-wrap gap-2 mb-6">
                                        {stages.map(s => (
                                            <div key={s.id} className="bg-white border-2 px-4 py-2 rounded-full text-[10px] font-black flex items-center gap-3 shadow-sm" style={{ borderColor: s.color }}>
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.color }} />{s.name}
                                                <button onClick={() => {if(confirm('確定刪除舞台？所有相關演出會消失。')) { setStages(stages.filter(x=>x.id!==s.id)); setActs(acts.filter(x=>x.stageId!==s.id)); }}} className="text-slate-300"><Icon name="trash" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[24px] space-y-4">
                                        <input id="s-name" type="text" placeholder="輸入舞台名稱..." className="w-full bg-white border-none rounded-xl px-4 py-3 text-sm font-bold shadow-sm" />
                                        <div className="flex flex-wrap gap-2 justify-center">
                                            {PRESET_COLORS.map(c => (
                                                <button key={c} onClick={() => window._selColor = c} className="w-9 h-9 rounded-full border-4 border-white focus:ring-4 focus:ring-black transition-all shadow-sm" style={{ backgroundColor: c }} />
                                            ))}
                                        </div>
                                        <button onClick={() => { const n = document.getElementById('s-name').value; if(n) setStages([...stages, { id: Date.now().toString(), name: n, color: window._selColor || '#000' }]); document.getElementById('s-name').value=''; }} className="w-full bg-indigo-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl">建立舞台</button>
                                    </div>
                                </section>

                                <section className="mb-12 bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl">
                                    <h3 className="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest flex items-center gap-2">Data Insurance</h3>
                                    <p className="text-[10px] text-slate-400 mb-6 leading-relaxed italic">備份代碼傳至記事本。換手機時，貼上並還原。</p>
                                    <textarea className="w-full h-28 bg-white/5 rounded-2xl p-4 text-[10px] font-mono text-slate-300 border-none mb-4 ring-1 ring-white/10" placeholder="在此貼上代碼..." value={backupData} onChange={(e) => setBackupData(e.target.value)}></textarea>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => { const s = JSON.stringify({ stages, acts, selectedIds }); setBackupData(s); alert('代碼已產生！'); }} className="bg-white/10 py-4 rounded-2xl font-black text-xs transition-all uppercase tracking-widest">Export</button>
                                        <button onClick={() => { if(!backupData) return; if(confirm('覆蓋目前所有資料？')) { try { const p = JSON.parse(backupData); setStages(p.stages || []); setActs(p.acts || []); setSelectedIds(p.selectedIds || []); alert('還原成功！'); setBackupData(''); } catch(e) { alert('代碼錯誤'); } } }} className="bg-indigo-600 py-4 rounded-2xl font-black text-xs shadow-lg uppercase tracking-widest">Restore</button>
                                    </div>
                                </section>

                                <section className="pb-10">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">管理演出清單</h3>
                                    <div className="space-y-3">
                                        {acts.sort((a,b)=>timeToMinutes(a.startTime)-timeToMinutes(b.startTime)).map(a => (
                                            <div key={a.id} className="flex justify-between items-center bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-[9px] font-bold text-slate-400">{a.day}</span>
                                                        <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: stages.find(s=>s.id===a.stageId)?.color }} />
                                                    </div>
                                                    <p className="font-black text-sm">{a.startTime} {a.name}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { const [sh, sm] = a.startTime.split(':'); const [eh, em] = a.endTime.split(':'); setFormAct({ day: a.day, stageId: a.stageId, name: a.name, sh, sm, eh, em }); setEditingActId(a.id); document.getElementById('admin-drawer').scrollTo({ top: 0, behavior: 'smooth' }); }} className="w-10 h-10 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-xl"><Icon name="edit" size={16}/></button>
                                                    <button onClick={() => { if(confirm('刪除這場？')) setActs(acts.filter(x=>x.id!==a.id)); }} className="w-10 h-10 flex items-center justify-center bg-red-50 text-red-600 rounded-xl"><Icon name="trash" size={16}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
